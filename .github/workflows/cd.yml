name: CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  MCP_IMAGE_NAME: ${{ github.repository }}
  BRIDGE_IMAGE_NAME: ${{ github.repository }}-bridge

jobs:
  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract MCP Docker metadata
        id: meta_mcp
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.MCP_IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push MCP image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta_mcp.outputs.tags }}
          labels: ${{ steps.meta_mcp.outputs.labels }}

      - name: Extract bridge Docker metadata
        id: meta_bridge
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BRIDGE_IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha

      - name: Build and push bridge image
        uses: docker/build-push-action@v6
        with:
          context: whatsapp-bridge
          push: true
          tags: ${{ steps.meta_bridge.outputs.tags }}
          labels: ${{ steps.meta_bridge.outputs.labels }}
