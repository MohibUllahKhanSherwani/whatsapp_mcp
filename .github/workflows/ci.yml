name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-checks:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install .

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: pytest -q

      - name: Verify package builds
        run: |
          pip install build
          python -m build

  go-checks:
    name: Go checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: whatsapp-bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: whatsapp-bridge/go.mod

      - name: Verify gofmt
        run: test -z "$(gofmt -l .)"

      - name: Build bridge
        run: go build ./...

      - name: Run tests
        run: go test ./...

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - python-checks
      - go-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build MCP Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: whatsapp-mcp:ci

      - name: Build bridge Docker image
        uses: docker/build-push-action@v6
        with:
          context: whatsapp-bridge
          push: false
          tags: whatsapp-bridge:ci
